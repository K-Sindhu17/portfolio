name: Build & Deploy Portfolio to EC2

on:
  push:
    branches: [main]

env:
  PORTFOLIO_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Portfolio Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.PORTFOLIO_IMAGE }}:latest
            ${{ env.PORTFOLIO_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Setup SSH and Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USERNAME }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${EC2_HOST} >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key"

          ${SSH_CMD} ${EC2_USER}@${EC2_HOST} "\
            docker system prune -af && \
            docker volume prune -f && \
            docker pull ${DOCKER_USER}/portfolio:latest && \
            cd ~/student-app && \
            export DOCKERHUB_USERNAME=${DOCKER_USER} && \
            export \$(cat .env.production | grep -v '^#' | xargs) && \
            docker compose -f docker-compose.prod.yml pull portfolio && \
            docker compose -f docker-compose.prod.yml up -d portfolio && \
            docker image prune -f"
